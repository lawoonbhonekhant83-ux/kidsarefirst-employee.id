<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee ID - 2024E007</title>

<style>
    body {
        margin: 0;
        background: #e9ecef;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .frame {
        background: white;
        padding: 12px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.2);

        /* THIS is the key: keeps ID card vertical */
        width: fit-content;
    }

    img {
        display: block;
        width: 320px;      /* fixed ID card width */
        height: auto;      /* keeps vertical ratio */
        border-radius: 8px;
    }
</style>

</head>

<body>

    <div class="frame">
        <img src="images/aty.png" alt="Employee ID Card">
    </div>

</body>
